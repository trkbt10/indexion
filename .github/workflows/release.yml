name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset: indexion-linux-x64
            archive: tar.gz
          - os: macos-latest
            target: darwin-arm64
            asset: indexion-darwin-arm64
            archive: tar.gz
          - os: windows-latest
            target: windows-x64
            asset: indexion-windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MoonBit CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Moon update
        run: moon update

      - name: Build
        run: moon build --target native --release

      - name: Prepare package (Unix)
        if: runner.os != 'Windows'
        run: |
          bin_path="_build/native/release/build/cmd/indexion/indexion.exe"
          if [ ! -f "$bin_path" ]; then
            echo "indexion binary not found at $bin_path"
            exit 1
          fi

          # Create package directory
          pkg_dir="${{ matrix.asset }}"
          mkdir -p "$pkg_dir"

          # Copy binary
          cp "$bin_path" "$pkg_dir/indexion"
          chmod +x "$pkg_dir/indexion"

          # Copy kgfs directory
          cp -r kgfs "$pkg_dir/"

          # Create archive
          tar -czvf "${{ matrix.asset }}.tar.gz" "$pkg_dir"

      - name: Prepare package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binPath = "_build/native/release/build/cmd/indexion/indexion.exe"
          if (-not (Test-Path $binPath)) {
            Write-Error "indexion binary not found at $binPath"
            exit 1
          }

          # Create package directory
          $pkgDir = "${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path $pkgDir

          # Copy binary
          Copy-Item $binPath "$pkgDir/indexion.exe"

          # Copy kgfs directory
          Copy-Item -Recurse kgfs "$pkgDir/"

          # Create archive
          Compress-Archive -Path $pkgDir -DestinationPath "${{ matrix.asset }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.${{ matrix.archive }}
          path: ${{ matrix.asset }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Copy all archives
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
          done

          # Generate checksums
          cd release
          for f in *; do
            sha256sum "$f" > "$f.sha256"
          done

          # List release contents
          echo "Release assets:"
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            ## Installation

            Download the archive for your platform and extract it:

            ### Linux (x64)
            ```bash
            tar -xzf indexion-linux-x64.tar.gz
            cd indexion-linux-x64
            ./indexion --help
            ```

            ### macOS (ARM64)
            ```bash
            tar -xzf indexion-darwin-arm64.tar.gz
            cd indexion-darwin-arm64
            ./indexion --help
            ```

            ### Windows (x64)
            Extract `indexion-windows-x64.zip` and run `indexion.exe`

            ## Package Contents

            Each package includes:
            - `indexion` (or `indexion.exe`) - the CLI binary
            - `kgfs/` - KGF language specification files

            ## Adding Custom KGF Specs

            Add your own `.kgf` files to the `kgfs/` directory to support additional languages.
