name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Check
        run: moon check --target native

      - name: Test
        run: moon test --target native

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run --filter '*' typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run --filter '*' test

      - name: Build wiki
        run: bun run --filter @indexion/wiki build

      - name: Upload wiki artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: wiki-dist
          path: packages/wiki/dist/client

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [moonbit, frontend]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset: indexion-linux-x64
            archive: tar.gz
          - os: macos-latest
            target: darwin-arm64
            asset: indexion-darwin-arm64
            archive: tar.gz
          - os: windows-latest
            target: windows-x64
            asset: indexion-windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MoonBit CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Moon update
        run: moon update

      - name: Build
        run: moon build --target native --release

      - name: Download wiki artifact
        uses: actions/download-artifact@v4
        with:
          name: wiki-dist
          path: wiki-dist

      - name: Prepare package (Unix)
        if: runner.os != 'Windows'
        run: |
          bin_path="_build/native/release/build/cmd/indexion/indexion.exe"
          if [ ! -f "$bin_path" ]; then
            echo "indexion binary not found at $bin_path"
            exit 1
          fi

          # Create package directory
          pkg_dir="${{ matrix.asset }}"
          mkdir -p "$pkg_dir"

          # Copy binary
          cp "$bin_path" "$pkg_dir/indexion"
          chmod +x "$pkg_dir/indexion"

          # Copy kgfs directory
          cp -r kgfs "$pkg_dir/"

          # Copy wiki frontend
          if [ -d "wiki-dist" ]; then
            cp -r wiki-dist "$pkg_dir/wiki"
          fi

          # Create archive
          tar -czvf "${{ matrix.asset }}.tar.gz" "$pkg_dir"

      - name: Prepare package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binPath = "_build/native/release/build/cmd/indexion/indexion.exe"
          if (-not (Test-Path $binPath)) {
            Write-Error "indexion binary not found at $binPath"
            exit 1
          }

          # Create package directory
          $pkgDir = "${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path $pkgDir

          # Copy binary
          Copy-Item $binPath "$pkgDir/indexion.exe"

          # Copy kgfs directory
          Copy-Item -Recurse kgfs "$pkgDir/"

          # Copy wiki frontend
          if (Test-Path "wiki-dist") {
            Copy-Item -Recurse "wiki-dist" "$pkgDir/wiki"
          }

          # Create archive
          Compress-Archive -Path $pkgDir -DestinationPath "${{ matrix.asset }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.${{ matrix.archive }}
          path: ${{ matrix.asset }}.${{ matrix.archive }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Copy all archives (skip non-release artifacts like wiki-dist)
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/$name" ]; then
              cp "$dir/$name" "release/$name"
            fi
          done

          # Generate checksums
          cd release
          for f in *; do
            sha256sum "$f" > "$f.sha256"
          done

          # List release contents
          echo "Release assets:"
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            ## Quick Install (Linux/macOS)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/trkbt10/indexion/main/install.sh | bash
            ```

            ## Manual Download

            Each archive contains the `indexion` binary and `kgfs/` language specs.

            See [Installation Guide](https://github.com/trkbt10/indexion#installation) for details.
