name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Sync version from moon.mod.json
        run: ./scripts/sync-version.sh

      - name: Check
        run: moon check --target native

      - name: Test
        run: moon test --target native

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Build KGF tokenizer (JS)
        run: moon build --target js

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build wiki
        run: bun run --filter @indexion/wiki build

      - name: Upload wiki artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-dist
          path: packages/wiki/dist/client

  build:
    needs: [moonbit, frontend]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset: indexion-linux-x64
            archive: tar.gz
          - os: macos-latest
            target: darwin-arm64
            asset: indexion-darwin-arm64
            archive: tar.gz
          - os: windows-latest
            target: windows-x64
            asset: indexion-windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # Windows: copy project to C:\s to shorten absolute paths.
      # moonc link-core concatenates all .core paths into one CreateProcessW
      # call; D:\a\indexion\indexion\_build\... exceeds the 32k char limit.
      # robocopy works even when cwd holds the source directory.
      - name: Copy to short path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          robocopy "${{ github.workspace }}" "C:\s" /E /NFL /NDL /NJH /NJS /NC /NS /NP
          # robocopy exit codes 0-7 are success
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE } else { $global:LASTEXITCODE = 0 }

      - name: Install MoonBit CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Moon update (Unix)
        if: runner.os != 'Windows'
        run: moon update

      - name: Moon update (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: C:\s
        run: moon update

      - name: Sync version from moon.mod.json (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/sync-version.sh

      - name: Sync version from moon.mod.json (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: C:\s
        run: |
          $version = (Get-Content moon.mod.json | ConvertFrom-Json).version
          $file = "src/update/version.mbt"
          (Get-Content $file) -replace 'pub let current_version : String = ".*"', "pub let current_version : String = `"$version`"" | Set-Content $file
          $mkt = "skills/.claude-plugin/marketplace.json"
          if (Test-Path $mkt) {
            (Get-Content $mkt) -replace '"version": "[^"]*"', "`"version`": `"$version`"" | Set-Content $mkt
          }

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: moon build --target native --release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: C:\s
        run: moon build --target native --release

      - name: Download wiki artifact
        uses: actions/download-artifact@v4
        with:
          name: wiki-dist
          path: wiki-dist

      - name: Copy wiki artifact to short path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "wiki-dist") {
            Copy-Item -Recurse "wiki-dist" "C:\s\wiki-dist"
          }

      - name: Prepare package (Unix)
        if: runner.os != 'Windows'
        run: |
          bin_path="_build/native/release/build/cmd/indexion/indexion.exe"
          if [ ! -f "$bin_path" ]; then
            echo "indexion binary not found at $bin_path"
            exit 1
          fi

          pkg_dir="${{ matrix.asset }}"
          mkdir -p "$pkg_dir"
          cp "$bin_path" "$pkg_dir/indexion"
          chmod +x "$pkg_dir/indexion"
          cp -r kgfs "$pkg_dir/"
          if [ -d "wiki-dist" ]; then
            cp -r wiki-dist "$pkg_dir/wiki"
          fi
          tar -czvf "${{ matrix.asset }}.tar.gz" "$pkg_dir"

      - name: Prepare package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: C:\s
        run: |
          $binPath = "_build\native\release\build\cmd\indexion\indexion.exe"
          if (-not (Test-Path $binPath)) {
            Write-Error "indexion binary not found at $binPath"
            exit 1
          }

          $pkgDir = "${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path $pkgDir
          Copy-Item $binPath "$pkgDir\indexion.exe"
          Copy-Item -Recurse kgfs "$pkgDir\"
          if (Test-Path "wiki-dist") {
            Copy-Item -Recurse "wiki-dist" "$pkgDir\wiki"
          }
          Compress-Archive -Path $pkgDir -DestinationPath "${{ matrix.asset }}.zip"

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.${{ matrix.archive }}
          path: ${{ matrix.asset }}.${{ matrix.archive }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.${{ matrix.archive }}
          path: C:\s\${{ matrix.asset }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/$name" ]; then
              cp "$dir/$name" "release/$name"
            fi
          done

          cd release
          for f in *; do
            sha256sum "$f" > "$f.sha256"
          done

          echo "Release assets:"
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            ## Quick Install (Linux/macOS)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/trkbt10/indexion/main/install.sh | bash
            ```

            ## Manual Download

            Each archive contains the `indexion` binary and `kgfs/` language specs.

            See [Installation Guide](https://github.com/trkbt10/indexion#installation) for details.
